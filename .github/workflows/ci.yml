name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  server:
    name: Server Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - working-directory: server
        run: npm ci
      - working-directory: server
        run: npx tsc --noEmit

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [frontend, server]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
